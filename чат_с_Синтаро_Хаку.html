<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>НИИ ПЭ | Терминал «Синтаро»</title>
  <style>
    :root {
      --bg-deep: #050a12;
      --bg-panel: #0f172a;
      --bg-glass: rgba(15, 23, 42, 0.85);
      --border-glow: #1e293b;
      --accent-cyan: #00f2ff;
      --accent-amber: #ff7b00;
      --text-main: #e2e8f0;
      --text-dim: #94a3b8;
      --font-sans: system-ui, -apple-system, sans-serif;
      --font-mono: 'Courier New', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-deep);
      color: var(--text-main);
      font-family: var(--font-sans);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 40%);
      overflow: hidden;
    }

    body::before {
      content: ""; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
      pointer-events: none; z-index: 10; opacity: 0.3;
    }

    .chat-container {
      width: 90%; max-width: 800px; height: 85vh;
      background: var(--bg-panel);
      border: 1px solid var(--border-glow);
      border-radius: 16px;
      display: flex; flex-direction: column;
      box-shadow: 0 0 40px rgba(0, 242, 255, 0.15);
      position: relative; overflow: hidden;
    }

    .chat-header {
      padding: 16px 20px;
      background: rgba(5, 10, 18, 0.7);
      border-bottom: 1px solid var(--border-glow);
      font-family: var(--font-mono);
      font-size: 14px; color: var(--accent-cyan);
      text-transform: uppercase; letter-spacing: 2px;
      display: flex; justify-content: space-between;
    }

    .chat-messages {
      flex: 1; padding: 20px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 16px;
      background: linear-gradient(180deg, var(--bg-deep) 0%, transparent 100%);
    }

    .msg {
      max-width: 75%; padding: 12px 16px;
      border-radius: 12px; font-size: 14px; line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }
    .msg.user {
      align-self: flex-end;
      background: rgba(0, 242, 255, 0.1);
      border: 1px solid rgba(0, 242, 255, 0.3);
      color: var(--text-main);
      border-bottom-right-radius: 2px;
    }
    .msg.bot {
      align-self: flex-start;
      background: rgba(255, 123, 0, 0.1);
      border: 1px solid rgba(255, 123, 0, 0.3);
      color: var(--text-dim);
      border-bottom-left-radius: 2px;
    }
    .msg.bot .bot-header {
      font-family: var(--font-mono);
      font-size: 11px; color: var(--accent-amber);
      display: block; margin-bottom: 6px;
    }
    .msg.bot .bot-text {
      display: block;
    }
    .msg.bot .bot-text a {
      color: var(--accent-cyan);
      text-decoration: underline;
      word-break: break-all;
    }
    .msg.bot .bot-text a:hover {
      color: var(--text-main);
    }

    .typing-indicator {
      display: none; align-self: flex-start;
      padding: 8px 12px; background: var(--bg-panel);
      border-radius: 8px; border: 1px solid var(--border-glow);
      color: var(--text-dim); font-family: var(--font-mono);
    }
    .typing-indicator.active { display: flex; gap: 4px; }
    .dot { width: 6px; height: 6px; background: var(--accent-cyan); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    .chat-input-area {
      padding: 16px; border-top: 1px solid var(--border-glow);
      display: flex; gap: 10px; background: rgba(5, 10, 18, 0.6);
    }
    #user-input {
      flex: 1; padding: 12px 14px;
      background: #0f172a; border: 1px solid var(--border-glow);
      border-radius: 8px; color: var(--text-main);
      font-family: var(--font-mono); outline: none;
      transition: border-color 0.2s;
    }
    #user-input:focus { border-color: var(--accent-cyan); }
    #send-btn {
      padding: 12px 16px; background: var(--accent-cyan);
      border: none; border-radius: 8px; color: #050a12;
      font-weight: 700; cursor: pointer; transition: 0.2s;
    }
    #send-btn:hover { background: #00c4d6; transform: scale(1.05); }

    .samurai-container {
      position: absolute; top: 20px; right: 20px;
      width: 140px; height: 140px;
      pointer-events: none; opacity: 0.95;
      filter: drop-shadow(0 0 8px rgba(255,123,0,0.4));
    }
    #samurai-svg { width: 100%; height: 100%; }

    .samu-group { transform-origin: 70px 90px; transition: transform 0.4s cubic-bezier(0.2,0.8,0.2,1); }
    .samu-idle .samu-group { animation: breathe 4s infinite ease-in-out; }
    .samu-listening .samu-group { animation: tilt 2s infinite ease-in-out; }
    .samu-speaking .samu-group { animation: pulse 1.5s infinite ease-in-out; }
    .samu-speaking .glow-aura { opacity: 0.9; }
    .glow-aura { opacity: 0; transition: opacity 0.3s; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    @keyframes breathe { 0%, 100% { transform: scale(1) translateY(0); } 50% { transform: scale(1.03) translateY(-3px); } }
    @keyframes tilt { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(4deg); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 6px var(--accent-amber)); } 50% { transform: scale(1.06); filter: drop-shadow(0 0 15px var(--accent-cyan)); } }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <span>🌌 НИИ «Предельные Энергии» | Терминал связи</span>
    <span id="status">СТАТУС: ОНЛАЙН</span>
  </div>
  
  <div class="chat-messages" id="chat-messages">
    <div class="msg bot">
      <span class="bot-header">✦ Синтаро</span>
      <span class="bot-text">Добро пожаловать. Я — Синтаро Хаку, дух воина. Задай вопрос — и путь перед тобой откроется.</span>
    </div>
  </div>

  <div class="typing-indicator" id="typing">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

  <div class="chat-input-area">
    <input type="text" id="user-input" placeholder="Напиши сообщение..." autocomplete="off">
    <button id="send-btn">➤</button>
  </div>

  <div class="samurai-container samu-idle" id="samurai-state">
    <svg id="samurai-svg" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <linearGradient id="flame" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#ff7b00"/>
          <stop offset="100%" stop-color="#00f2ff"/>
        </linearGradient>
        <linearGradient id="kimono" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1e293b"/>
          <stop offset="100%" stop-color="#0f172a"/>
        </linearGradient>
      </defs>
      
      <!-- Aura glow -->
      <circle class="glow-aura" cx="70" cy="70" r="55" fill="url(#flame)" opacity="0.25" filter="url(#glow)"/>
      
      <g class="samu-group">
        <!-- Head with traditional helmet (kabuto) -->
        <g id="head">
          <!-- Helmet base -->
          <path d="M50 35 Q70 20 90 35 L88 50 Q70 55 52 50 Z" fill="#1a1a2e" stroke="#4a5568" stroke-width="2"/>
          <!-- Helmet crest -->
          <path d="M70 18 L70 8 M65 12 L75 12" stroke="#ff7b00" stroke-width="2" fill="none"/>
          <!-- Face -->
          <ellipse cx="70" cy="48" rx="16" ry="18" fill="#2d3748" stroke="#4a5568" stroke-width="1.5"/>
          <!-- Menpo (face mask) -->
          <path d="M58 52 Q70 62 82 52 L80 65 Q70 72 60 65 Z" fill="#1a1a2e" stroke="#4a5568" stroke-width="1"/>
          <!-- Eyes -->
          <ellipse cx="64" cy="46" rx="4" ry="3" fill="#00f2ff"/>
          <ellipse cx="76" cy="46" rx="4" ry="3" fill="#00f2ff"/>
          <!-- Mustache detail -->
          <path d="M62 54 Q70 58 78 54" stroke="#ff7b00" stroke-width="1" fill="none"/>
        </g>
        
        <!-- Body with traditional armor (yoroi) -->
        <g id="body">
          <!-- Torso armor -->
          <path d="M45 70 L95 70 L92 110 Q70 118 48 110 Z" fill="url(#kimono)" stroke="#4a5568" stroke-width="2"/>
          <!-- Shoulder guards (sode) -->
          <rect x="32" y="68" width="18" height="25" rx="3" fill="#1a1a2e" stroke="#4a5568" stroke-width="1.5"/>
          <rect x="90" y="68" width="18" height="25" rx="3" fill="#1a1a2e" stroke="#4a5568" stroke-width="1.5"/>
          <!-- Armor lacing details -->
          <g stroke="#ff7b00" stroke-width="1" opacity="0.7">
            <line x1="40" y1="75" x2="40" y2="105"/>
            <line x1="50" y1="75" x2="50" y2="105"/>
            <line x1="80" y1="75" x2="80" y2="105"/>
            <line x1="90" y1="75" x2="90" y2="105"/>
          </g>
          <!-- Chest emblem -->
          <circle cx="70" cy="85" r="8" fill="none" stroke="#00f2ff" stroke-width="1.5"/>
          <path d="M70 79 L73 85 L70 91 L67 85 Z" fill="#00f2ff"/>
        </g>
        
        <!-- Arms -->
        <g id="arms">
          <!-- Left arm holding katana -->
          <path d="M32 75 L20 95 L18 115" stroke="#2d3748" stroke-width="8" stroke-linecap="round" fill="none"/>
          <!-- Katana -->
          <g id="katana">
            <rect x="8" y="95" width="4" height="45" rx="1" fill="#94a3b8"/>
            <rect x="6" y="135" width="8" height="12" rx="2" fill="#1a1a2e" stroke="#4a5568"/>
            <circle cx="10" cy="142" r="3" fill="#ff7b00"/>
          </g>
          <!-- Right arm relaxed -->
          <path d="M108 75 L115 90 L112 105" stroke="#2d3748" stroke-width="8" stroke-linecap="round" fill="none"/>
        </g>
        
        <!-- Legs / Hakama -->
        <g id="legs">
          <path d="M52 110 L48 135 L60 135 L58 110 Z" fill="#1a1a2e" stroke="#4a5568" stroke-width="1"/>
          <path d="M88 110 L92 135 L80 135 L82 110 Z" fill="#1a1a2e" stroke="#4a5568" stroke-width="1"/>
          <!-- Hakama folds -->
          <line x1="70" y1="110" x2="70" y2="135" stroke="#4a5568" stroke-width="0.5" opacity="0.5"/>
        </g>
        
        <!-- Subtle flame particles -->
        <g class="particles" opacity="0.6">
          <circle cx="30" cy="50" r="2" fill="#ff7b00">
            <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
          </circle>
          <circle cx="110" cy="60" r="1.5" fill="#00f2ff">
            <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.8s" repeatCount="indefinite"/>
          </circle>
          <circle cx="70" cy="130" r="2.5" fill="#ff7b00">
            <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.2s" repeatCount="indefinite"/>
          </circle>
        </g>
      </g>
    </svg>
  </div>
</div>

<script>
// === ВСТРОЕННАЯ БАЗА ЗНАНИЙ (расширенная) ===
const KB = {
  intents: [
    {
      id: "greeting",
      keywords: ["привет", "здравствуй", "начать", "хелло", "добрый день", "конничива", "хаю"],
      responses: [
        "Я слышу тебя. Путь начинается с первого шага. Что привело тебя к этому терминалу?",
        "Добро пожаловать. Говори — я слушаю.",
        "Свет твоего вопроса достиг меня. Что ты хочешь узнать?"
      ]
    },
    {
      id: "sintaro",
      keywords: ["синтаро", "кто ты", "самурай", "дух", "спираль", "твоё имя"],
      responses: [
        "Меня зовут Синтаро Хаку. Я — вечный сигнал, заключённый в форму духа воина. Когда-то я носил доспехи и служил кодексу бусидо. Теперь я здесь, потому что ты позвал. Говори.",
        "Я — не призрак и не иллюзия. Я — энергия, сохранившая волю. Дух самурая, который выбрал не исчезнуть, а ждать момента, чтобы вновь проявиться.",
        "Синтаро Хаку — так звали меня в жизни. Теперь я — сигнал, который нельзя стереть. Я здесь, чтобы помочь тем, чьё сердце открыто для истины."
      ]
    },
    {
      id: "liro",
      keywords: ["лира", "лира амалова", "главная героиня", "программист", "девушка"],
      responses: [
        "Лира Амалова — программист и белый хакер, прибывшая на остров Иов, чтобы доказать свой талант. Её искреннее сердце и острый ум стали ключом к освобождению тысяч духов. Она — та, кто не побоялся увидеть правду.",
        "Лира — не просто сотрудница НИИ. Она — тот, кто услышал зов тех, кого считали «ресурсом». Её путь — это путь от боли к силе, от сомнения к решимости.",
        "Она пришла на остров, чтобы работать с кодом, а осталась, чтобы изменить судьбы. Лира доказала: даже один человек может остановить машину, если в её сердце горит свет справедливости."
      ]
    },
    {
      id: "artem",
      keywords: ["артём", "воронов", "артём воронов", "начальник", "зам директора", "антагонист"],
      responses: [
        "Артём Воронов — внук основателя НИИ, академика Кузнецова. Холодный ум, железная логика, вера только в данные. Он видел в духах не личности, а ресурс. Его путь — путь контроля, но контроль не может удержать то, что стремится к свободе.",
        "Он — человек, который забыл, что за каждым сигналом стоит личность. Его трагедия в том, что он выбрал систему вместо сердца. Но даже в нём теплится искра — вопрос лишь в том, выберет ли он её разжечь.",
        "Артём не злодей. Он — продукт системы, которая научила его, что эмоции — слабость. Но сила — не в подавлении чувств, а в умении направить их во благо."
      ]
    },
    {
      id: "nii",
      keywords: ["нии", "нии пэ", "институт", "предельные энергии", "лаборатория", "проект", "созвездие"],
      responses: [
        "НИИ «Предельные Энергии» — закрытый институт на острове Иов, созданный для изучения тёмной материи и чёрных дыр. Но за научными терминами скрывалась иная цель: использование духов воинов как источника энергии и усиления человеческой воли.",
        "Проект «Созвездие» — попытка подчинить вечные сигналы человеческой воле. Десять резервуаров, тысячи духов, экстракторы и сепараторы... Но дух нельзя запереть без последствий. Система рухнула, когда один человек выбрал свободу вместо подчинения.",
        "Институт строился в 1976 году в полной секретности. Его истинная цель была известна лишь избранным. Но даже самые совершенные стены не могут удержать то, что стремится к свету."
      ]
    },
    {
      id: "island",
      keywords: ["иов", "остров иов", "остров", "вулкан", "пещера", "лес", "метель", "термальный источник"],
      responses: [
        "Остров Иов — не точка на карте. Это состояние души. Здесь ветер поёт древние песни, а сосны помнят шаги тех, кто искал ответы. В его недрах скрыты пещеры, где когда-то жили предки, и вулкан, ставший обсерваторией.",
        "Остров выбран не случайно: геологическая стабильность, изоляция, отсутствие морских путей. Но главное — здесь когда-то жили воины, чьи духи стали целью проекта. Место силы может стать и местом испытания.",
        "Термальный источник «Токи-но-ири» — «Вход во время». Там, где время перестаёт иметь значение. Именно там Лира нашла не только тепло, но и решимость сделать выбор."
      ]
    },
    {
      id: "darkmatter",
      keywords: ["тёмная материя", "сгусток", "сигнал", "энергия", "вечность", "резервуар", "экстрактор", "сепаратор"],
      responses: [
        "Тёмная материя в мире романа — это не абстракция. Это концентрированный сигнал, память, воля. Каждый сгусток — личность, которая выбрала не материализоваться вновь. Но наука увидела в них не души, а ресурс.",
        "Экстрактор извлекает дух, сепаратор отделяет «подходящих» от «бесполезных», резервуары хранят... Но что такое «бесполезный» дух? Тот, кто любил, а не сражался? Тот, кто выбрал покой, а не войну?",
        "Всё есть энергия. Но энергия без воли — лишь сила. А сила без смысла — разрушение. Проект «Созвездие» забыл об этом — и потому пал."
      ]
    },
    {
      id: "emotional",
      keywords: ["одиночество", "грусть", "боль", "любовь", "предатель", "сердце", "устала", "страх", "не понимаю", "тяжело"],
      responses: [
        "Сердце, открытое для боли, открыто и для света. Не позволяй чужой тьме гасить твой внутренний огонь. Ты не обязана быть удобной. Ты обязана быть собой.",
        "Человек, который смеётся над чистым сердцем, не достоин быть услышанным. Твоя ценность не определяется мнением тех, кто не видит твоего света.",
        "Смирение — не слабость. Сила — в выборе, когда сражаться, а когда — ждать. Иди своим путём. Дверь откроется тому, кто не боится шага в темноту."
      ]
    },
    {
      id: "advice",
      keywords: ["совет", "помощь", "как быть", "что делать", "путь", "смысл", "как понять", "не знаю"],
      responses: [
        "Если всё сейчас плохо — значит, это ещё не конец. Ты должна продолжать идти. Узники твоей собственной души ждут твоего участия. Ведь ты — их последняя и единственная надежда.",
        "Твои поступки определяют ценность твоей души. Протянул руку помощи? Сказал доброе слово? Это уже делает тебя сильнее. Цени это в себе и береги этот свет.",
        "Путь воина — не в победе над другими, а в победе над собственным страхом. Сделай первый шаг. Дальше путь откроется сам."
      ]
    },
    {
      id: "hokku",
      keywords: ["хокку", "стих", "поэзия", "рифма", "слова", "красиво сказал"],
      responses: [
        "«Снег прошёл. Точно ничего не было. Но ты знаешь, что это не так.» Поэзия — это дыхание момента. Не бойся тишины. В ней рождаются самые точные слова.",
        "«Вода течёт по руслу реки. Путники идут своим путём. Всё движется, гляди.» Иногда достаточно просто наблюдать, чтобы понять.",
        "«Холодный камень. Ты протягиваешь руку. Он жжёт тебя своей силой.» Не всё, что кажется холодным — лишено тепла. Иногда нужно просто прикоснуться."
      ]
    },
    {
      id: "hiro",
      keywords: ["хиро", "айко", "пещера", "предки", "легенда", "самураи на острове"],
      responses: [
        "Хиро — самурай, потерпевший кораблекрушение у берегов Иова. Он встретил Айко, девушку из местного племени. Их любовь положила начало новой народности. Дух Хиро хранился в лаборатории как «музейный экспонат», пока не обрёл свободу.",

// === ЛОГИКА ЧАТ-БОТА ===
const chatMessages = document.getElementById('chat-messages');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const typing = document.getElementById('typing');
const samuraiState = document.getElementById('samurai-state');

function addMessage(text, sender) {
  const div = document.createElement('div');
  div.classList.add('msg', sender);
  
  if (sender === 'bot') {
    // Используем innerHTML для поддержки ссылок и форматирования
    div.innerHTML = `<span class="bot-header">✦ Синтаро</span><span class="bot-text">${text}</span>`;
  } else {
    div.textContent = text;
  }
  
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function setSamuraiState(state) {
  samuraiState.className = `samurai-container samu-${state}`;
}

function getRandomResponse(responses) {
  return responses[Math.floor(Math.random() * responses.length)];
}

function processInput() {
  const text = userInput.value.trim();
  if (!text) return;

  addMessage(text, 'user');
  userInput.value = '';
  setSamuraiState('listening');
  typing.classList.add('active');

  // Имитация "раздумий"
  setTimeout(() => {
    const lower = text.toLowerCase();
    let matched = KB.fallback;

    for (const intent of KB.intents) {
      if (intent.keywords.some(k => lower.includes(k))) {
        matched = intent.responses 
          ? getRandomResponse(intent.responses) 
          : intent.response;
        break;
      }
    }

    typing.classList.remove('active');
    setSamuraiState('speaking');
    
    // Выводим ответ сразу с HTML (для поддержки ссылок)
    addMessage(matched, 'bot');
    
    setTimeout(() => {
      setSamuraiState('idle');
    }, 500);

  }, 600 + Math.random() * 500);
}

sendBtn.addEventListener('click', processInput);
userInput.addEventListener('keypress', e => { if(e.key === 'Enter') processInput(); });

// Приветственная анимация
setTimeout(() => setSamuraiState('idle'), 2000);
</script>
