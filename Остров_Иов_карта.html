<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Остров Иов — Интерактивная карта</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',Tahoma,sans-serif; background:#0a0e1a; color:#ddd; overflow:hidden; height:100vh; }

.topbar { position:fixed; top:0; left:0; right:0; height:48px; background:rgba(10,14,26,.95); border-bottom:1px solid #2a2e3a; display:flex; align-items:center; padding:0 20px; z-index:100; gap:12px; }
.topbar h1 { font-size:17px; font-weight:700; background:linear-gradient(90deg,#ffb450,#ff8c00); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.topbar span { font-size:11px; color:#666; }

.spirit-bar { position:fixed; top:56px; left:15px; z-index:90; background:rgba(15,19,32,.92); border:1px solid rgba(255,180,80,.25); border-radius:12px; padding:10px 18px; display:flex; align-items:center; gap:12px; transition:.3s; }
.spirit-bar:hover { border-color:rgba(255,180,80,.6); }
#spiritNum { font-size:18px; font-weight:700; color:#ffb450; min-width:90px; }
#spiritSub { font-size:10px; color:#777; line-height:1.3; }
.btn-lib { background:rgba(255,180,80,.12); border:1px solid rgba(255,180,80,.35); color:#ffb450; padding:6px 14px; border-radius:8px; cursor:pointer; font-size:13px; font-weight:600; transition:.3s; white-space:nowrap; }
.btn-lib:hover { background:rgba(255,180,80,.25); }
.btn-lib:disabled { opacity:.3; cursor:default; }

.map-container { position:absolute; top:48px; left:0; right:0; bottom:36px; overflow:hidden; cursor:grab; background:radial-gradient(ellipse at center,#0f1a2e 0%,#0a0e1a 100%); }
.map-container:active { cursor:grabbing; }
#mapSvg { position:absolute; transform-origin:0 0; will-change:transform; }

.loc-group { cursor:pointer; }
.loc-group:hover .loc-glow { r:18; opacity:.6; }
.loc-group:hover text { fill:#fff !important; }
.loc-label { font-size:11px; fill:#bbb; pointer-events:none; text-anchor:middle; font-weight:600; }
.loc-name { font-size:9px; fill:#888; pointer-events:none; text-anchor:middle; }

.side-panel { position:fixed; top:48px; right:0; width:420px; height:calc(100vh - 84px); background:rgba(12,16,28,.97); border-left:1px solid #2a2e3a; transform:translateX(100%); transition:transform .4s cubic-bezier(.22,1,.36,1); z-index:80; overflow-y:auto; scrollbar-width:thin; scrollbar-color:#4a3f6b #1a1f35; }
.side-panel.open { transform:translateX(0); }
.panel-header { position:sticky; top:0; background:rgba(12,16,28,.98); padding:16px 20px 10px; border-bottom:1px solid #2a2e3a; z-index:2; }
.panel-close { float:right; background:none; border:none; color:#888; font-size:26px; cursor:pointer; line-height:1; }
.panel-close:hover { color:#f90; }
.panel-title { font-size:20px; font-weight:700; color:#fff; margin-top:4px; }
.panel-badges { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
.badge { font-size:10px; padding:2px 8px; border-radius:10px; font-weight:600; }
.badge-danger { background:rgba(255,80,80,.15); color:#ff6b6b; }
.badge-warn { background:rgba(255,180,80,.15); color:#ffb450; }
.badge-info { background:rgba(80,150,255,.15); color:#50b4ff; }
.badge-spirit { background:rgba(255,200,50,.15); color:#ffc832; }
.badge-secret { background:rgba(255,100,100,.15); color:#ff4444; }
.panel-body { padding:12px 20px 30px; }
.panel-quote { font-style:italic; color:#ffb450; font-size:13px; margin:10px 0; padding:8px 12px; border-left:3px solid rgba(255,180,80,.3); background:rgba(255,180,80,.03); border-radius:0 8px 8px 0; }
.panel-desc { font-size:14px; line-height:1.7; color:#ccc; margin:12px 0; }
.panel-section-title { font-size:13px; font-weight:700; color:#ffb450; text-transform:uppercase; letter-spacing:1px; margin:14px 0 8px; }
.panel-list { list-style:none; padding:0; }
.panel-list li { padding:4px 0 4px 18px; position:relative; font-size:13px; color:#aaa; }
.panel-list li::before { content:'▸'; position:absolute; left:0; color:#ffb450; }
.panel-hokku { font-style:italic; color:#cc9944; font-size:14px; line-height:1.8; padding:12px 16px; margin:12px 0; background:rgba(255,150,50,.04); border-radius:10px; border:1px solid rgba(255,150,50,.1); }

.overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:200; display:none; justify-content:center; align-items:center; }
.overlay.show { display:flex; }
.egg-box { background:linear-gradient(135deg,#151a30,#1a1f35); border:1px solid rgba(255,180,80,.3); border-radius:16px; padding:30px; max-width:420px; text-align:center; box-shadow:0 0 60px rgba(255,150,50,.15); }
.egg-box .emoji { font-size:48px; margin-bottom:10px; }
.egg-box h3 { color:#ffb450; font-size:18px; margin-bottom:10px; }
.egg-box p { color:#aaa; font-size:13px; line-height:1.6; }
.egg-close { margin-top:16px; background:rgba(255,180,80,.15); border:1px solid rgba(255,180,80,.3); color:#ffb450; padding:6px 20px; border-radius:8px; cursor:pointer; font-size:13px; }

.timeline { position:fixed; bottom:0; left:0; right:0; height:36px; background:rgba(10,14,26,.92); border-top:1px solid #2a2e3a; display:flex; align-items:center; padding:0 16px; gap:10px; z-index:50; }
.tl-date { font-size:12px; color:#ffb450; font-weight:600; min-width:100px; white-space:nowrap; }
.tl-slider { flex:1; -webkit-appearance:none; height:4px; background:#2a2e3a; border-radius:2px; outline:none; }
.tl-slider::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:#ffb450; cursor:pointer; }
.tl-event { font-size:11px; color:#666; max-width:250px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.hokku-bar { position:fixed; bottom:44px; left:50%; transform:translateX(-50%); text-align:center; pointer-events:none; z-index:50; }
.hokku-text { font-style:italic; font-size:14px; color:rgba(255,220,170,.55); line-height:1.7; text-shadow:0 0 15px rgba(255,150,50,.15); transition:opacity .5s; }

.zoom-controls { position:fixed; bottom:44px; right:15px; z-index:50; display:flex; flex-direction:column; gap:4px; }
.zoom-btn { width:36px; height:36px; background:rgba(15,19,32,.9); border:1px solid #2a2e3a; color:#bbb; font-size:18px; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:.2s; }
.zoom-btn:hover { background:rgba(255,180,80,.12); color:#ffb450; border-color:rgba(255,180,80,.3); }

.snow-canvas { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:5; }

#spiritAnimation { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:300; }

.loader { position:fixed; inset:0; background:#0a0e1a; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity .8s; }
.loader.hide { opacity:0; pointer-events:none; }
.spinner { width:50px; height:50px; border:3px solid rgba(255,180,80,.1); border-top-color:#ffb450; border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loader-text { color:#ffb450; font-size:14px; margin-top:16px; letter-spacing:2px; }

@media(max-width:700px){ .side-panel{width:100%} #spiritNum{font-size:15px} .spirit-bar{padding:8px 12px} }
</style>

// ============ SNOW ============
function initSnow(){
  var canvas = document.getElementById('snowCanvas');
  if(!canvas) return;
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  var ctx = canvas.getContext('2d');
  var flakes = [];
  for(var i=0;i<80;i++){
    flakes.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*2.5+1,
      speed:Math.random()*0.8+0.3,
      wind:Math.random()*0.4-0.2,
      opacity:Math.random()*0.6+0.3
    });
  }
  function drawSnow(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(var i=0;i<flakes.length;i++){
      var f = flakes[i];
      ctx.beginPath();
      ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+f.opacity+')';
      ctx.fill();
      f.y+=f.speed;
      f.x+=f.wind+Math.sin(f.y*0.01)*0.3;
      if(f.y>canvas.height+5){f.y=-5;f.x=Math.random()*canvas.width;}
      if(f.x>canvas.width+5)f.x=-5;
      if(f.x<-5)f.x=canvas.width+5;
    }
    requestAnimationFrame(drawSnow);
  }
  drawSnow();
  window.addEventListener('resize',function(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
  });
}

// ============ SPIRIT ANIMATION ============
function doSpiritAnimation(){
  var canvas = document.getElementById('spiritAnimation');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  var ctx = canvas.getContext('2d');

  // Position from tank 7 (center-ish)
  var startX = window.innerWidth * 0.5;
  var startY = window.innerHeight * 0.55;

  var particles = [];
  var count = 200;

  for(var i=0;i<count;i++){
    particles.push({
      x: startX + (Math.random()-0.5)*80,
      y: startY + (Math.random()-0.5)*40,
      tx: startX + (Math.random()-0.5)*window.innerWidth*0.8,
      ty: -Math.random()*window.innerHeight*0.6 - 50,
      size: Math.random()*4+1.5,
      delay: Math.random()*3000,
      duration: Math.random()*4000+4000,
      hue: Math.random()*40+20,
      trail: []
    });
  }

  var startTime = null;
  var totalTime = 8000;

  function animate(ts){
    if(!startTime) startTime = ts;
    var elapsed = ts - startTime;
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(elapsed > totalTime){
      canvas.style.pointerEvents='none';
      return;
    }

    for(var i=0;i<particles.length;i++){
      var p = particles[i];
      var t = Math.max(0, (elapsed - p.delay)) / p.duration;
      if(t < 0 || t > 1) continue;

      // Ease out
      var ease = 1 - Math.pow(1-t,3);
      var curY = p.y + (p.ty - p.y)*ease;
      var curX = p.x + (p.tx - p.x)*ease;
      var alpha = Math.min(1, t*3)*(t<0.8?1:(1-t)/0.2);

      // Trail
      p.trail.push({x:curX,y:curY,a:alpha});
      if(p.trail.length>8) p.trail.shift();

      // Draw trail
      for(var j=0;j<p.trail.length;j++){
        var tr = p.trail[j];
        var ta = (j/p.trail.length)*alpha*0.4;
        ctx.beginPath();
        ctx.arc(tr.x,tr.y,p.size*0.6,0,Math.PI*2);
        ctx.fillStyle='hsla('+p.hue+',100%,60%,'+ta+')';
        ctx.fill();
      }

      // Draw particle glow
      ctx.beginPath();
      ctx.arc(curX,curY,p.size*2.5,0,Math.PI*2);
      var grd = ctx.createRadialGradient(curX,curY,0,curX,curY,p.size*2.5);
      grd.addColorStop(0,'hsla('+p.hue+',100%,80%,'+(alpha*0.6)+')');
      grd.addColorStop(1,'hsla('+p.hue+',100%,50%,0)');
      ctx.fillStyle=grd;
      ctx.fill();

      // Core
      ctx.beginPath();
      ctx.arc(curX,curY,p.size,0,Math.PI*2);
      ctx.fillStyle='hsla('+p.hue+',100%,85%,'+alpha+')';
      ctx.fill();
    }

    // Central flash
    if(elapsed < 2000){
      var flashAlpha = Math.max(0, 1-elapsed/2000)*0.3;
      var fg = ctx.createRadialGradient(startX,startY,0,startX,startY,100);
      fg.addColorStop(0,'rgba(255,200,100,'+flashAlpha+')');
      fg.addColorStop(1,'rgba(255,150,50,0)');
      ctx.fillStyle=fg;
      ctx.fillRect(startX-100,startY-100,200,200);
    }

    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
}

// ============ MAP DRAG & ZOOM ============
function setupMapDrag(){
  var container = document.getElementById('mapContainer');
  var svg = document.getElementById('mapSvg');
  container.addEventListener('mousedown', function(e){
    if(e.target.closest('.loc-group'))return;
    dragging=true; dragStartX=e.clientX; dragStartY=e.clientY;
    panStartX=panX; panStartY=panY; e.preventDefault();
  });
  window.addEventListener('mousemove', function(e){
    if(!dragging)return;
    panX=panStartX+(e.clientX-dragStartX); panY=panStartY+(e.clientY-dragStartY);
    updateTransform();
  });
  window.addEventListener('mouseup', function(){dragging=false;});
  container.addEventListener('wheel', function(e){
    e.preventDefault();
    var delta = e.deltaY>0?0.9:1.1;
    applyZoom(delta, e.offsetX, e.offsetY);
  },{passive:false});

  // Touch
  var touchDist=0,touchScale=1;
  container.addEventListener('touchstart', function(e){
    if(e.touches.length===1&&!e.target.closest('.loc-group')){
      dragging=true; dragStartX=e.touches[0].clientX; dragStartY=e.touches[0].clientY;
      panStartX=panX; panStartY=panY;
    } else if(e.touches.length===2){
      dragging=false;
      var dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
      touchDist=Math.sqrt(dx*dx+dy*dy); touchScale=currentZoom;
    }
  });
  container.addEventListener('touchmove', function(e){
    e.preventDefault();
    if(e.touches.length===1&&dragging){
      panX=panStartX+(e.touches[0].clientX-dragStartX);
      panY=panStartY+(e.touches[0].clientY-dragStartY);
      updateTransform();
    } else if(e.touches.length===2){
      var dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
      var dist=Math.sqrt(dx*dx+dy*dy);
      var scale=touchScale*(dist/touchDist);
      if(scale>=0.3&&scale<=5)currentZoom=scale;
      updateTransform();
    }
  },{passive:false});
  container.addEventListener('touchend', function(){dragging=false;});

  // Double-click for easter eggs
  var locGroups = document.querySelectorAll('.loc-group');
  for(var i=0;i<locGroups.length;i++){
    (function(loc){
      var el=loc.querySelector('[data-id]');
      if(!el)return;
      var id=el.getAttribute('data-id');
      var clickCount=0, clickTimer=null;
      loc.addEventListener('click', function(){
        clickCount++;
        if(clickCount===1){
          clickTimer=setTimeout(function(){clickCount=0;},300);
        }
        if(clickCount>=2){
          clearTimeout(clickTimer); clickCount=0;
          showEasterEgg(id);
        }
      });
    })(locGroups[i]);
  }
}

function updateTransform(){
  var svg=document.getElementById('mapSvg');
  svg.style.transform='translate('+panX+'px,'+panY+'px) scale('+currentZoom+')';
}

function applyZoom(factor,cx,cy){
  var nz=currentZoom*factor;
  if(nz<0.3||nz>5)return;
  var c=document.getElementById('mapContainer');
  var rect=c.getBoundingClientRect();
  var mx=cx!==undefined?cx:rect.width/2;
  var my=cy!==undefined?cy:rect.height/2;
  panX=mx-(mx-panX)*factor;
  panY=my-(my-panY)*factor;
  currentZoom=nz;
  updateTransform();
}

function doZoom(f){applyZoom(f);}
function resetZoom(){currentZoom=1;panX=0;panY=0;updateTransform();}

// ============ PANEL ============
function openLocation(id){
  var loc=locations[id];
  if(!loc)return;
  document.querySelectorAll('.loc-group').forEach(function(g){g.classList.remove('active');});
  var el=document.querySelector('[data-id="'+id+'"]').closest('.loc-group');
  if(el)el.classList.add('active');
  var bodyEl=document.getElementById('panelBody');
  var titleEl=document.getElementById('panelTitle');
  var badgesEl=document.getElementById('panelBadges');
  var bh='';
  if(loc.badges&&loc.badges.length){
    for(var bi=0;bi<loc.badges.length;bi++){
      var b=loc.badges[bi];
      bh+='<span class="badge '+b[1]+'">'+b[0]+'</span>';
    }
  }
  var dh='';
  if(loc.details&&loc.details.length){
    dh='<div class="panel-section-title">📋 Детали</div><ul class="panel-list">';
    for(var di=0;di<loc.details.length;di++)dh+='<li>'+loc.details[di]+'</li>';
    dh+='</ul>';
  }
  var hh='';
  if(loc.hokku)hh='<div class="panel-hokku">'+loc.hokku.replace(/\n/g,'<br>')+'</div>';
  bodyEl.innerHTML='<div class="panel-quote">'+(loc.quote||'')+'</div><div class="panel-desc">'+loc.description+'</div>'+dh+hh+'<div style="padding:8px 0;font-size:11px;color:#555;">💡 Дважды кликните на метку карты для скрытых деталей</div>';
  titleEl.textContent=loc.name;
  badgesEl.innerHTML=bh;
  document.getElementById('sidePanel').classList.add('open');
}

function closePanel(){
  document.getElementById('sidePanel').classList.remove('open');
  document.querySelectorAll('.loc-group').forEach(function(g){g.classList.remove('active');});
}

// ============ SPIRITS ============
function doLiberate(){
  if(spiritsLiberated>=totalSpirits||animating)return;
  animating=true;

  // Trigger spirit animation
  doSpiritAnimation();

  var amount=Math.min(861,totalSpirits-spiritsLiberated);
  spiritsLiberated+=amount;
  document.getElementById('spiritNum').textContent=spiritsLiberated.toLocaleString()+' / '+totalSpirits.toLocaleString();

  if(spiritsLiberated>=totalSpirits){
    var btn=document.getElementById('btnLiberate');
    if(btn)btn.disabled=true;
    btn.textContent='✨ ВСЕ ОСВОБОЖДЕНЫ';
  }

  setTimeout(function(){animating=false;},5000);
}

// ============ EASTER EGGS ============
function showEasterEgg(locId){
  var overlay=document.getElementById('eggOverlay');
  var box=document.getElementById('eggBox');
  var autoEgg=locId?easterEggs[locId]:null;
  var emoji=autoEgg?autoEgg.emoji:'💎';
  var title=autoEgg?autoEgg.title:'Секрет открыт!';
  var text=autoEgg?autoEgg.text:'Здесь скрыта тайна острова. Продолжайте исследование...';
  box.innerHTML='<div class="emoji">'+emoji+'</div><h3>'+title+'</h3><p>'+text+'</p><button class="egg-close" onclick="closeEgg()">Закрыть</button>';
  overlay.classList.add('show');
}

function closeEgg(){document.getElementById('eggOverlay').classList.remove('show');}

var hokus=[
  "Снег прошёл.\nТочно ничего не было.\nНо ты знаешь, что это не так.",
  "Ночь и беззвёздное небо путают тебя.\nГляди темноте прямо в глаза.\nУбей её своим светом.",
  "Холодный камень.\nТы протягиваешь руку.\nОн жжёт тебя своей силой.",
  "Водя течёт точно время.\nУносит пыль веков с собой.\nПрислушайся!",
  "Солнце согревает плоды.\nНо им нужно время созреть.\nТак и ты.",
  "Тихо вокруг.\nИ если прислушаться\nМожно услышать себя.",
  "Снег и холод.\nНо истинный огонь\nВ цветах сакуры.",
  "Нежная ветка вишни\nКолышется на ветру.\nЗамри и внемли."
];

function updateHokku(){
  var el=document.getElementById('hokkuText');
  if(!el)return;
  el.style.opacity='0';
  setTimeout(function(){
    var h=hokus[Math.floor(Math.random()*hokus.length)];
    el.innerHTML=h.replace(/\n/g,'<br>');
    el.style.opacity='1';
  },400);
}

// ============ TIMELINE ============
function doTimeline(val){
  var idx=Math.min(Math.floor(parseInt(val)/100*timelineData.length),timelineData.length-1);
  var item=timelineData[idx];
  document.getElementById('tlDate').textContent=item.date;
  document.getElementById('tlEvent').textContent=item.event;
}

// ============ INIT ============
document.addEventListener('DOMContentLoaded',function(){
  try{
    initSnow();
    setupMapDrag();
    updateHokku();
    timerHokku=setInterval(updateHokku,25000);
    setTimeout(function(){
      var l=document.getElementById('loader');
      if(l)l.classList.add('hide');
    },800);
  }catch(e){console.error("Init:",e);}
});
</script>
